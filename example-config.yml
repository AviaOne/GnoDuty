---
# GnoDuty - Configuration File
# Gno.land (TM2) Validator Monitoring
# https://github.com/AviaOne/gnoduty

# Controls whether the dashboard is enabled.
enable_dashboard: yes
# What TCP port the dashboard will listen on.
# The dashboard is accessible at http://YOUR_SERVER_IP:8889
# For HTTPS, use a reverse proxy (Caddy, Nginx) in front of this port.
listen_port: 8889
# Hide logs is useful if the dashboard will be posted publicly. It disables the log feed,
# and obscures most node-related details.
hide_logs: no
# How long to wait before alerting that a node is down.
node_down_alert_minutes: 3
# Node down alert PagerDuty severity.
node_down_alert_severity: critical

# Should the Prometheus exporter be enabled?
prometheus_enabled: yes
# What port should it listen on?
prometheus_listen_port: 28687

# Global alert settings. These apply to all chains unless overridden per-chain.

# PagerDuty settings
pagerduty:
  enabled: no
  api_key: YOUR_PAGERDUTY_API_KEY
  default_severity: alert

# Discord settings
# The webhook is set by right-clicking on a channel, editing the settings,
# and configuring a webhook in the integrations section.
discord:
  enabled: no
  webhook: https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN

# Telegram settings
# Talk to @BotFather to get an API key.
# The channel is the group ID where messages will be sent.
telegram:
  enabled: no
  api_key: 'YOUR_BOT_API_KEY'
  channel: "-YOUR_CHANNEL_ID"

# Slack settings
# The webhook can be added in the Slack app directory.
slack:
  enabled: no
  webhook: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK

# Healthcheck - send a ping to a URL at a regular interval.
healthcheck:
  enabled: no
  ping_url: ""
  ping_rate: 60

# The various chains to be monitored. Create a new entry for each chain.
# The name in quotes is the user-friendly label displayed on the dashboard.
# If a setting is omitted it will default to an empty string for strings,
# zero for numbers, false for booleans.
chains:

  # -------------------------------------------------------------------------
  # Chain 1 - Example: Gno.land test11 testnet
  # -------------------------------------------------------------------------
  # The name in quotes is the display name shown on the dashboard and logs.
  # It can be anything you want, e.g. "Gno.land (test11)", "My Gno Node", etc.
  "Gno.land (test11)":
    # chain_id must match the chain ID returned by the RPC /status endpoint.
    # Verify: curl -s https://rpc.test11.testnets.gno.land/status | python3 -c "import json,sys; print(json.load(sys.stdin)['result']['node_info']['network'])"
    chain_id: test11
    # Your validator address in bech32 format (starts with g1...).
    # Find it on a Gno.land explorer or with your validator key.
    valoper_address: g1_YOUR_VALIDATOR_ADDRESS_HERE
    # Should the monitor revert to public endpoints if all supplied RPC nodes fail?
    public_fallback: no

    # Alert settings for this chain.
    alerts:
      # Alert if the chain stops producing new blocks.
      stalled_enabled: yes
      # How many minutes before a stalled chain triggers an alarm.
      stalled_minutes: 10
      # Alert after N consecutive missed blocks.
      consecutive_enabled: yes
      # How many missed blocks should trigger a notification.
      consecutive_missed: 5
      # PagerDuty severity for consecutive missed blocks.
      consecutive_priority: critical
      # Alert if a percentage of the signing window is missed.
      percentage_enabled: no
      # What percentage should trigger the alert.
      percentage_missed: 10
      # PagerDuty severity for percentage missed.
      percentage_priority: warning
      # Alert if the validator is not in the active set (jailed, unbonding, etc.)
      alert_if_inactive: yes
      # Alert if no RPC servers are responding (instantaneous, no delay).
      alert_if_no_servers: yes

      # Chain-specific alert overrides.
      # Both global AND per-chain must be enabled for alerts to be sent.
      # Leave api_key/webhook/channel empty to use global settings above.
      pagerduty:
        enabled: no
        api_key: ""
      discord:
        enabled: no
        webhook: ""
      # Telegram is enabled by default in this example because it is the most
      # common alert channel used by validators.
      telegram:
        enabled: yes
        api_key: "" # uses default if blank
        channel: "" # uses default if blank
      slack:
        enabled: no
        webhook: ""

    # RPC endpoints to monitor. Multiple nodes are recommended for redundancy.
    # URL must include protocol://hostname:port
    # For Gno.land testnets, public RPC endpoints are available at:
    #   https://rpc.test11.testnets.gno.land:443
    nodes:
      - url: https://rpc.test11.testnets.gno.land:443
        # Should we send an alert if this host is not responding?
        alert_if_down: yes

  # -------------------------------------------------------------------------
  # Chain 2 - Example: adding a second chain (uncomment to enable)
  # -------------------------------------------------------------------------
  # "Gno.land (mainnet)":
  #   chain_id: gno-mainnet-1
  #   valoper_address: g1_YOUR_MAINNET_VALIDATOR_ADDRESS
  #   public_fallback: no
  #   alerts:
  #     stalled_enabled: yes
  #     stalled_minutes: 10
  #     consecutive_enabled: yes
  #     consecutive_missed: 5
  #     consecutive_priority: critical
  #     percentage_enabled: no
  #     percentage_missed: 10
  #     percentage_priority: warning
  #     alert_if_inactive: yes
  #     alert_if_no_servers: yes
  #     pagerduty:
  #       enabled: no
  #       api_key: ""
  #     discord:
  #       enabled: no
  #       webhook: ""
  #     telegram:
  #       enabled: yes
  #       api_key: ""
  #       channel: ""
  #     slack:
  #       enabled: no
  #       webhook: ""
  #   nodes:
  #     - url: https://rpc.gno.land:443
  #       alert_if_down: yes
  #     - url: https://your-own-node:26657
  #       alert_if_down: yes
